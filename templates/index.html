<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoMarket Intel</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a0f;--bg2:#080f18;--bg3:#0d1829;--border:#1a3050;--border2:#1e4a7a;--accent:#00d4ff;--accent2:#00ff9d;--accent3:#ff6b35;--warn:#ffb347;--danger:#ff4757;--purple:#c084fc;--text:#c8dde8;--dim:#4a7a9b;--bright:#e8f4ff;--mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--mono);font-size:1rem;color:var(--accent);letter-spacing:2px;}
.logo span{color:var(--accent2);}
.hright{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#last-run{font-family:var(--mono);font-size:.68rem;color:var(--dim);}
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:.72rem;padding:5px 12px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:var(--accent);color:var(--bg);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.container{max-width:1440px;margin:0 auto;padding:1.2rem 1.5rem;}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.2rem;}
.tab{font-family:var(--mono);font-size:.75rem;letter-spacing:1.5px;padding:9px 20px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;}
.tab:hover{color:var(--accent);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;}
@media(max-width:900px){.g3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr;}}

.card{background:var(--bg2);border:1px solid var(--border);padding:1.1rem 1.3rem;transition:border-color .2s;animation:fadeUp .35s ease both;}
.card:hover{border-color:var(--border2);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.clabel{font-family:var(--mono);font-size:.65rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem;}
.clabel::before{content:'//';color:var(--accent);opacity:.6;}
.cbody{font-size:.88rem;line-height:1.7;color:var(--text);}

.fc{background:var(--bg2);border:1px solid var(--border);padding:1.5rem;margin-bottom:.9rem;animation:fadeUp .35s ease both;}
.fc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.9rem;gap:.8rem;flex-wrap:wrap;}
.fc-title{font-size:1rem;font-weight:700;color:var(--bright);line-height:1.3;}
.badges{display:flex;gap:.4rem;flex-wrap:wrap;}
.badge{font-family:var(--mono);font-size:.6rem;letter-spacing:1px;padding:2px 8px;border:1px solid;text-transform:uppercase;}
.b-global{border-color:var(--accent);color:var(--accent);}
.b-europe{border-color:var(--purple);color:var(--purple);}
.b-middle_east{border-color:var(--accent3);color:var(--accent3);}
.b-south_asia{border-color:var(--warn);color:var(--warn);}
.b-bangladesh{border-color:var(--accent2);color:var(--accent2);}
.b-low{border-color:var(--accent2);color:var(--accent2);}
.b-medium{border-color:var(--warn);color:var(--warn);}
.b-high{border-color:var(--accent3);color:var(--accent3);}
.b-critical{border-color:var(--danger);color:var(--danger);}

.fc-summary{font-size:.9rem;line-height:1.75;color:var(--text);margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:.9rem;}
@media(max-width:700px){.tg{grid-template-columns:1fr;}}
.tb{background:var(--bg3);border:1px solid var(--border);padding:.85rem;}
.tb-label{font-family:var(--mono);font-size:.6rem;letter-spacing:2px;color:var(--accent);margin-bottom:.4rem;text-transform:uppercase;}
.tb-text{font-size:.83rem;line-height:1.65;color:var(--text);}

.section-toggle{width:100%;text-align:left;background:var(--bg3);border:1px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:.68rem;letter-spacing:1.5px;padding:7px 12px;cursor:pointer;margin-top:.5rem;transition:all .2s;display:flex;justify-content:space-between;}
.section-toggle:hover{color:var(--accent);border-color:var(--accent);}
.section-body{display:none;background:var(--bg3);border:1px solid var(--border);border-top:none;padding:.9rem 1rem;}
.section-body.open{display:block;}

.ap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;}
@media(max-width:700px){.ap-grid{grid-template-columns:1fr;}}
.ap-item{background:var(--bg2);border:1px solid var(--border);padding:.75rem;}
.ap-label{font-family:var(--mono);font-size:.62rem;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:.3rem;}
.ap-text{font-size:.82rem;line-height:1.6;color:var(--text);}

.alert-list{list-style:none;margin-top:.6rem;}
.alert-list li{padding:6px 10px;margin-bottom:.4rem;font-size:.85rem;line-height:1.5;border-left:2px solid;}
.alert-ok{border-left-color:var(--accent2);color:var(--text);}
.alert-warn{border-left-color:var(--warn);color:var(--warn);}
.alert-risk{border-left-color:var(--danger);color:var(--accent3);}

.tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.7rem;}
.tag{font-family:var(--mono);font-size:.65rem;padding:2px 7px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);}
.tag-r{border-color:var(--danger);color:var(--danger);}
.tag-o{border-color:var(--accent2);color:var(--accent2);}
.fc-time{font-family:var(--mono);font-size:.62rem;color:var(--dim);margin-top:.7rem;}

.mtbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:.8rem;}
.mtbl thead tr{border-bottom:1px solid var(--border);}
.mtbl th{text-align:left;padding:7px 10px;color:var(--dim);font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;}
.mtbl td{padding:7px 10px;border-bottom:1px solid rgba(26,48,80,.4);color:var(--text);}
.mtbl tr:hover td{background:var(--bg3);}
.cat-hdr td{background:var(--bg3);color:var(--dim);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-bottom:1px solid var(--border);}
.price{font-weight:600;color:var(--bright);}
.up{color:var(--accent2);}
.down{color:var(--danger);}

.ni{border-bottom:1px solid rgba(26,48,80,.4);padding:.85rem 0;}
.ni:last-child{border-bottom:none;}
.ni-title{font-size:.9rem;font-weight:600;color:var(--bright);margin-bottom:.25rem;line-height:1.4;}
.ni-title a{color:inherit;text-decoration:none;}
.ni-title a:hover{color:var(--accent);}
.ni-meta{font-family:var(--mono);font-size:.63rem;color:var(--dim);}
.ni-desc{font-size:.81rem;color:var(--dim);margin-top:.25rem;line-height:1.5;}
.ni-tag{display:inline-block;font-family:var(--mono);font-size:.58rem;padding:1px 5px;border:1px solid;margin-left:6px;text-transform:uppercase;letter-spacing:1px;vertical-align:middle;}

.loading{font-family:var(--mono);color:var(--dim);font-size:.78rem;padding:2rem;text-align:center;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.empty{font-family:var(--mono);color:var(--dim);font-size:.75rem;padding:2rem;text-align:center;background:var(--bg2);border:1px dashed var(--border);}
</style>
</head>
<body>
<header>
  <div class="logo">GEO<span>MARKET</span>_INTEL</div>
  <div class="hright">
    <div class="dot"></div>
    <span id="last-run">—</span>
    <button class="btn" id="run-btn" onclick="runNow()">▶ RUN NOW</button>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('forecasts')">FORECASTS</button>
    <button class="tab" onclick="switchTab('market')">MARKETS</button>
    <button class="tab" onclick="switchTab('news')">NEWS FEED</button>
  </div>

  <div id="tab-forecasts" class="tab-content active">
    <div class="g2" style="margin-bottom:.9rem;">
      <div class="card">
        <div class="clabel">Filter Region</div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
          <button class="btn" onclick="loadForecasts()">ALL</button>
          <button class="btn" onclick="loadForecasts('global')">🌍 GLOBAL</button>
          <button class="btn" onclick="loadForecasts('europe')">🇪🇺 EUROPE</button>
          <button class="btn" onclick="loadForecasts('middle_east')">🐪 M.EAST</button>
          <button class="btn" onclick="loadForecasts('south_asia')">🌏 S.ASIA</button>
          <button class="btn" onclick="loadForecasts('bangladesh')">🇧🇩 BD</button>
        </div>
      </div>
      <div class="card">
        <div class="clabel">System Status</div>
        <div id="status-text" class="cbody" style="font-family:var(--mono);font-size:.72rem;">Loading...</div>
      </div>
    </div>
    <div id="forecasts-container"><div class="loading">// FETCHING INTELLIGENCE DATA...</div></div>
  </div>

  <div id="tab-market" class="tab-content">
    <div id="market-container"><div class="loading">// LOADING MARKET DATA...</div></div>
  </div>

  <div id="tab-news" class="tab-content">
    <div class="g2" style="margin-bottom:.9rem;">
      <div class="card">
        <div class="clabel">Filter Region</div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
          <button class="btn" onclick="loadNews()">ALL</button>
          <button class="btn" onclick="loadNews('us_europe')">US/EU</button>
          <button class="btn" onclick="loadNews('south_asia')">S.ASIA</button>
          <button class="btn" onclick="loadNews('middle_east')">M.EAST</button>
          <button class="btn" onclick="loadNews('global_markets')">MARKETS</button>
          <button class="btn" onclick="loadNews('crypto')">CRYPTO</button>
        </div>
      </div>
      <div class="card">
        <div class="clabel">Live Feed</div>
        <div class="cbody" style="font-family:var(--mono);font-size:.72rem;" id="news-count">Loading...</div>
      </div>
    </div>
    <div id="news-container"><div class="loading">// FETCHING NEWS FEED...</div></div>
  </div>
</div>

<script>
const REGION_COLORS = {us_europe:'#00d4ff',south_asia:'#ffb347',middle_east:'#ff6b35',global_markets:'#00ff9d',crypto:'#c084fc'};

function timeAgo(iso){const h=Math.floor((Date.now()-new Date(iso+'Z').getTime())/3.6e6);if(h<1)return'just now';if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function typeBadge(t){return`<span class="badge b-${t}">${t.toUpperCase().replace('_',' ')}</span>`;}
function riskBadge(r){return`<span class="badge b-${r||'medium'}">${(r||'?').toUpperCase()}</span>`;}
function alertClass(txt){if(!txt)return'';if(txt.startsWith('✅')||txt.toLowerCase().includes('positive'))return'alert-ok';if(txt.startsWith('⚠️'))return'alert-warn';return'alert-risk';}

async function loadStatus(){
  try{
    const d=await fetch('/api/status').then(r=>r.json());
    document.getElementById('last-run').textContent='Last: '+(d.last_run==='Never'?'Never':timeAgo(d.last_run));
    document.getElementById('status-text').innerHTML=`FORECASTS: ${d.forecasts_count} | ASSETS: ${d.market_assets} | UTC: ${d.server_time.slice(0,19)}`;
  }catch(e){document.getElementById('status-text').textContent='Status unavailable';}
}

let currentFilter=null;
async function loadForecasts(type){
  currentFilter=type||null;
  const container=document.getElementById('forecasts-container');
  container.innerHTML='<div class="loading">// PROCESSING INTELLIGENCE...</div>';
  const url='/api/forecasts'+(type?'?type='+type:'');
  const forecasts=await fetch(url).then(r=>r.json());
  if(!forecasts.length){container.innerHTML=`<div class="empty">// NO FORECASTS YET. CLICK ▶ RUN NOW TO GENERATE.</div>`;return;}
  container.innerHTML=forecasts.map(f=>buildForecastCard(f)).join('');
}

function buildForecastCard(f){
  const d=f.data||{};
  
  let actionPlanHTML='';
  if(d.action_plan){
    const ap=d.action_plan;
    actionPlanHTML=`
    <button class="section-toggle" onclick="toggleSection(this)">
      📋 ACTION PLAN FOR CITIZENS <span>▼</span>
    </button>
    <div class="section-body">
      <div class="ap-grid">
        ${Object.entries(ap).map(([k,v])=>`
          <div class="ap-item">
            <div class="ap-label">${k.replace(/_/g,' ')}</div>
            <div class="ap-text">${v}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  let alertsHTML='';
  const alerts=d.citizen_alerts||[];
  if(alerts.length){
    alertsHTML=`
    <button class="section-toggle" onclick="toggleSection(this)">
      🚨 CITIZEN ALERTS <span>▼</span>
    </button>
    <div class="section-body">
      <ul class="alert-list">
        ${alerts.map(a=>`<li class="${alertClass(a)}">${a}</li>`).join('')}
      </ul>
    </div>`;
  }

  const risks=d.key_risks||[];
  const opps=d.opportunities||[];

  return`
  <div class="fc">
    <div class="fc-header">
      <div class="fc-title">${d.title||f.title||'Forecast'}</div>
      <div class="badges">
        ${typeBadge(f.forecast_type)}
        ${riskBadge(f.risk_level)}
        <span class="badge" style="border-color:var(--dim);color:var(--dim)">CONF: ${(f.confidence||'?').toUpperCase()}</span>
      </div>
    </div>
    <div class="fc-summary">${d.summary||f.summary||'No summary available.'}</div>
    <div class="tg">
      <div class="tb"><div class="tb-label">▸ SHORT (1–2 WKS)</div><div class="tb-text">${d.short_term||'—'}</div></div>
      <div class="tb"><div class="tb-label">▸ MEDIUM (1–3 MO)</div><div class="tb-text">${d.medium_term||'—'}</div></div>
      <div class="tb"><div class="tb-label">▸ LONG (3–12 MO)</div><div class="tb-text">${d.long_term||'—'}</div></div>
    </div>
    ${actionPlanHTML}
    ${alertsHTML}
    ${risks.length||opps.length?`
    <div class="tags">
      ${risks.map(r=>`<span class="tag tag-r">✕ ${r}</span>`).join('')}
      ${opps.map(o=>`<span class="tag tag-o">+ ${o}</span>`).join('')}
    </div>`:''}
    <div class="fc-time">// Generated ${timeAgo(f.created_at)} — ${f.created_at}</div>
  </div>`;
}

function toggleSection(btn){
  const body=btn.nextElementSibling;
  const arrow=btn.querySelector('span');
  body.classList.toggle('open');
  if(arrow)arrow.textContent=body.classList.contains('open')?'▲':'▼';
}

let marketLoaded=false;
async function loadMarket(){
  marketLoaded=true;
  const container=document.getElementById('market-container');
  const data=await fetch('/api/market').then(r=>r.json());
  if(!data.length){container.innerHTML=`<div class="empty">// NO MARKET DATA. RUN THE SCHEDULER TO FETCH PRICES.</div>`;return;}
  const byCategory={};
  data.forEach(d=>{if(!byCategory[d.category])byCategory[d.category]=[];byCategory[d.category].push(d);});
  let html=`<div class="card"><table class="mtbl"><thead><tr><th>Symbol</th><th>Name</th><th style="text-align:right">Price</th><th style="text-align:right">24h Chg</th><th style="text-align:right">Volume</th></tr></thead><tbody>`;
  for(const[cat,rows]of Object.entries(byCategory)){
    html+=`<tr class="cat-hdr"><td colspan="5">${cat}</td></tr>`;
    rows.forEach(d=>{
      const up=d.change_pct>=0,arrow=up?'▲':'▼';
      const vol=d.volume>1e9?(d.volume/1e9).toFixed(1)+'B':d.volume>1e6?(d.volume/1e6).toFixed(1)+'M':d.volume>0?d.volume.toLocaleString():'—';
      html+=`<tr><td><span style="color:var(--accent)">${d.symbol}</span></td><td>${d.name}</td><td class="price" style="text-align:right">${d.price.toLocaleString(undefined,{maximumFractionDigits:4})}</td><td class="${up?'up':'down'}" style="text-align:right">${arrow} ${Math.abs(d.change_pct).toFixed(2)}%</td><td style="text-align:right;color:var(--dim)">${vol}</td></tr>`;
    });
  }
  html+='</tbody></table></div>';
  container.innerHTML=html;
}

let newsLoaded=false;
async function loadNews(region){
  newsLoaded=true;
  const container=document.getElementById('news-container');
  container.innerHTML='<div class="loading">// FETCHING NEWS...</div>';
  const articles=await fetch('/api/news').then(r=>r.json());
  const filtered=region?articles.filter(a=>a.region===region):articles;
  document.getElementById('news-count').textContent=`${filtered.length} ARTICLES | LAST UPDATED: ${articles[0]?timeAgo(articles[0].fetched_at):'NEVER'}`;
  if(!filtered.length){container.innerHTML=`<div class="empty">// NO NEWS. RUN THE SCHEDULER TO FETCH HEADLINES.</div>`;return;}
  container.innerHTML=`<div class="card">${filtered.map(a=>`
    <div class="ni">
      <div class="ni-title">
        ${a.url?`<a href="${a.url}" target="_blank" rel="noopener">${a.title||'Untitled'}</a>`:(a.title||'Untitled')}
        ${a.region?`<span class="ni-tag" style="border-color:${REGION_COLORS[a.region]||'#4a7a9b'};color:${REGION_COLORS[a.region]||'#4a7a9b'}">${a.region.replace('_',' ')}</span>`:''}
      </div>
      ${a.description?`<div class="ni-desc">${a.description.slice(0,160)}...</div>`:''}
      <div class="ni-meta">${a.source||'Unknown'} · ${a.fetched_at?timeAgo(a.fetched_at):''}</div>
    </div>`).join('')}</div>`;
}

async function runNow(){
  const btn=document.getElementById('run-btn');
  btn.disabled=true;btn.textContent='⏳ RUNNING...';
  try{
    const d=await fetch('/api/run-now',{method:'POST'}).then(r=>r.json());
    if(d.status==='success'){
      btn.textContent='✅ DONE';
      marketLoaded=false;newsLoaded=false;
      await loadStatus();
      await loadForecasts(currentFilter);
    }else{
      btn.textContent='❌ ERROR';
      alert('Error: '+d.message);
    }
  }catch(e){
    btn.textContent='❌ FAILED';alert(e.message);
  }
  setTimeout(()=>{btn.textContent='▶ RUN NOW';btn.disabled=false;},3000);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['forecasts','market','news'][i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='market'&&!marketLoaded)loadMarket();
  if(name==='news'&&!newsLoaded)loadNews();
}

loadStatus();
loadForecasts();
</script>
</body>
</html>
