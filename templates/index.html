<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GeoMarket Intel — Daily Forecaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --bg2: #080f18;
    --bg3: #0d1829;
    --border: #1a3050;
    --border-glow: #1e4a7a;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --warn: #ffb347;
    --danger: #ff4757;
    --text: #c8dde8;
    --text-dim: #4a7a9b;
    --text-bright: #e8f4ff;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
    --glow: 0 0 20px rgba(0, 212, 255, 0.3);
    --glow2: 0 0 20px rgba(0, 255, 157, 0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: var(--glow);
  }

  .logo span { color: var(--accent2); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #last-run {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .run-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .run-btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: var(--glow);
  }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .tab {
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    padding: 10px 22px;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--accent); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    text-shadow: var(--glow);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Grid ── */
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem; }
  .col-span-2 { grid-column: span 2; }
  .col-span-3 { grid-column: span 3; }

  @media (max-width: 1000px) {
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .col-span-3 { grid-column: span 2; }
  }
  @media (max-width: 640px) {
    .grid-3, .grid-2 { grid-template-columns: 1fr; }
    .col-span-2, .col-span-3 { grid-column: span 1; }
  }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 1.2rem 1.4rem;
    position: relative;
    transition: border-color 0.2s;
    animation: fadeIn 0.4s ease both;
  }
  .card:hover { border-color: var(--border-glow); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-label {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card-label::before {
    content: '//';
    color: var(--accent);
    opacity: 0.6;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 0.6rem;
    line-height: 1.3;
  }

  .card-body {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text);
  }

  /* ── Forecast Cards ── */
  .forecast-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 1.6rem;
    margin-bottom: 1rem;
    animation: fadeIn 0.4s ease both;
  }

  .forecast-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    gap: 1rem;
  }

  .forecast-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-bright);
  }

  .forecast-meta {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 1px;
    padding: 3px 9px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .badge-geo    { border-color: var(--accent);  color: var(--accent); }
  .badge-market { border-color: var(--accent2); color: var(--accent2); }
  .badge-bd     { border-color: var(--warn);    color: var(--warn); }

  .risk-low      { border-color: var(--accent2); color: var(--accent2); }
  .risk-medium   { border-color: var(--warn);    color: var(--warn); }
  .risk-high     { border-color: var(--accent3); color: var(--accent3); }
  .risk-critical { border-color: var(--danger);  color: var(--danger); }

  .forecast-summary {
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .timeframe-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-bottom: 1rem;
  }

  @media (max-width: 700px) {
    .timeframe-grid { grid-template-columns: 1fr; }
  }

  .timeframe-block {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 0.9rem;
  }

  .timeframe-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .timeframe-text {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
  }

  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.8rem;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 3px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .tag-risk { border-color: #ff4757; color: #ff4757; }
  .tag-opp  { border-color: var(--accent2); color: var(--accent2); }

  .forecast-time {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 0.8rem;
  }

  /* ── Market Table ── */
  .market-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.82rem;
  }

  .market-table thead tr {
    border-bottom: 1px solid var(--border);
  }

  .market-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text-dim);
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .market-table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(26,48,80,0.5);
    color: var(--text);
    vertical-align: middle;
  }

  .market-table tr:hover td { background: var(--bg3); }

  .cat-header td {
    background: var(--bg3);
    color: var(--text-dim);
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-bottom: 1px solid var(--border);
  }

  .price { font-weight: 600; color: var(--text-bright); }
  .up   { color: var(--accent2); }
  .down { color: var(--danger); }

  /* ── News ── */
  .news-item {
    border-bottom: 1px solid rgba(26,48,80,0.5);
    padding: 0.9rem 0;
  }
  .news-item:last-child { border-bottom: none; }

  .news-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 0.3rem;
    line-height: 1.4;
  }
  .news-title a { color: inherit; text-decoration: none; }
  .news-title a:hover { color: var(--accent); }

  .news-meta {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
  }
  .news-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    line-height: 1.5;
  }
  .news-region {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 1px 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--accent);
    margin-left: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    vertical-align: middle;
  }

  /* ── Asset Views ── */
  .asset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.7rem;
    margin-top: 0.8rem;
  }
  @media (max-width: 700px) { .asset-grid { grid-template-columns: 1fr 1fr; } }

  .asset-view {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 0.8rem;
  }
  .asset-name {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 0.3rem;
  }
  .asset-signal {
    font-size: 0.85rem;
    font-weight: 700;
  }
  .bullish  { color: var(--accent2); }
  .bearish  { color: var(--danger); }
  .neutral  { color: var(--warn); }
  .asset-reason {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 0.2rem;
    line-height: 1.4;
  }

  /* ── Loading ── */
  .loading {
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 0.8rem;
    padding: 2rem;
    text-align: center;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .empty {
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 0.78rem;
    padding: 2rem;
    text-align: center;
    background: var(--bg2);
    border: 1px dashed var(--border);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-glow); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── Sections within Sector Views ── */
  .sector-table { width: 100%; border-collapse: collapse; }
  .sector-table td {
    padding: 7px 10px;
    border-bottom: 1px solid rgba(26,48,80,0.4);
    font-size: 0.85rem;
  }
  .sector-table td:first-child {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 40%;
  }
</style>
</head>
<body>

<header>
  <div class="logo">GEO<span>MARKET</span>_INTEL</div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span id="last-run">Loading...</span>
    <button class="run-btn" id="run-btn" onclick="runNow()">▶ RUN NOW</button>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('forecasts')">FORECASTS</button>
    <button class="tab" onclick="switchTab('market')">MARKETS</button>
    <button class="tab" onclick="switchTab('news')">NEWS FEED</button>
  </div>

  <!-- FORECASTS TAB -->
  <div id="tab-forecasts" class="tab-content active">
    <div class="grid-3" style="margin-bottom:1.2rem;">
      <div class="card">
        <div class="card-label">Filter</div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="run-btn" onclick="loadForecasts()">ALL</button>
          <button class="run-btn" onclick="loadForecasts('geopolitical')">GEO</button>
          <button class="run-btn" onclick="loadForecasts('market')">MARKET</button>
          <button class="run-btn" onclick="loadForecasts('bangladesh')">BD</button>
        </div>
      </div>
      <div class="card col-span-2">
        <div class="card-label">System Status</div>
        <div id="status-text" class="card-body" style="font-family:var(--mono);font-size:0.78rem;">Loading status...</div>
      </div>
    </div>
    <div id="forecasts-container"><div class="loading">// FETCHING INTELLIGENCE DATA...</div></div>
  </div>

  <!-- MARKET TAB -->
  <div id="tab-market" class="tab-content">
    <div id="market-container"><div class="loading">// LOADING MARKET DATA...</div></div>
  </div>

  <!-- NEWS TAB -->
  <div id="tab-news" class="tab-content">
    <div id="news-container"><div class="loading">// FETCHING NEWS FEED...</div></div>
  </div>
</div>

<script>
// ── Routing ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['forecasts','market','news'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  if (name === 'market' && !marketLoaded) loadMarket();
  if (name === 'news'   && !newsLoaded)   loadNews();
}

let marketLoaded = false;
let newsLoaded = false;

// ── Helpers ──────────────────────────────────────────────────────────────────
function riskBadgeClass(r) {
  const m = { low: 'risk-low', medium: 'risk-medium', high: 'risk-high', critical: 'risk-critical' };
  return 'badge ' + (m[r] || 'risk-medium');
}
function typeBadge(t) {
  const m = {
    geopolitical: 'badge badge-geo',
    market: 'badge badge-market',
    bangladesh: 'badge badge-bd',
  };
  return `<span class="${m[t] || 'badge badge-geo'}">${t.toUpperCase()}</span>`;
}
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso + 'Z').getTime();
  const h = Math.floor(diff / 3.6e6);
  if (h < 1) return 'just now';
  if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}
function parseSignal(raw) {
  if (!raw) return { signal: 'neutral', reason: '' };
  const lower = raw.toLowerCase();
  const signal = lower.startsWith('bullish') ? 'bullish' :
                 lower.startsWith('bearish') ? 'bearish' : 'neutral';
  const reason = raw.replace(/^(bullish|bearish|neutral)\s*[—\-–]\s*/i, '');
  return { signal, reason };
}

// ── Status ───────────────────────────────────────────────────────────────────
async function loadStatus() {
  const r = await fetch('/api/status');
  const d = await r.json();
  document.getElementById('last-run').textContent = 'Last run: ' + (d.last_run === 'Never' ? 'Never' : timeAgo(d.last_run));
  document.getElementById('status-text').innerHTML =
    `FORECASTS: ${d.forecasts_count} &nbsp;|&nbsp; ASSETS TRACKED: ${d.market_assets} &nbsp;|&nbsp; SERVER: ${d.server_time.slice(0,19)} UTC`;
}

// ── Forecasts ────────────────────────────────────────────────────────────────
async function loadForecasts(type) {
  const container = document.getElementById('forecasts-container');
  container.innerHTML = '<div class="loading">// PROCESSING INTELLIGENCE...</div>';
  const url = '/api/forecasts' + (type ? '?type=' + type : '');
  const r = await fetch(url);
  const forecasts = await r.json();

  if (!forecasts.length) {
    container.innerHTML = `<div class="empty">// NO FORECASTS FOUND. RUN THE SCHEDULER OR CLICK "RUN NOW" TO GENERATE.</div>`;
    return;
  }

  container.innerHTML = forecasts.map(f => {
    const d = f.data || {};
    const risks = d.key_risks || [];
    const opps  = d.opportunities || d.watch_list || [];
    const hotspots = d.hotspots || [];

    // Asset views (market forecasts)
    let assetViewsHTML = '';
    if (d.asset_views) {
      const keys = ['sp500','bitcoin','gold','oil','emerging_markets','bangladesh_india'];
      const labels = ['S&P 500','Bitcoin','Gold','Oil','EM','BD/India'];
      assetViewsHTML = `<div class="card-label" style="margin-top:1rem;">Asset Views</div>
      <div class="asset-grid">
        ${keys.map((k,i) => {
          const raw = d.asset_views[k] || '';
          const { signal, reason } = parseSignal(raw);
          return `<div class="asset-view">
            <div class="asset-name">${labels[i]}</div>
            <div class="asset-signal ${signal}">${signal.toUpperCase()}</div>
            <div class="asset-reason">${reason}</div>
          </div>`;
        }).join('')}
      </div>`;
    }

    // Sector views (Bangladesh forecasts)
    let sectorHTML = '';
    if (d.sector_views) {
      const sv = d.sector_views;
      sectorHTML = `<div class="card-label" style="margin-top:1rem;">Sector Views</div>
      <table class="sector-table">
        ${Object.entries(sv).map(([k,v]) =>
          `<tr><td>${k.replace(/_/g,' ')}</td><td>${v}</td></tr>`
        ).join('')}
      </table>`;
    }

    return `
    <div class="forecast-card">
      <div class="forecast-header">
        <div class="forecast-title">${d.title || f.title || 'Forecast'}</div>
        <div class="forecast-meta">
          ${typeBadge(f.forecast_type)}
          <span class="${riskBadgeClass(f.risk_level)}">${(f.risk_level||'?').toUpperCase()}</span>
          <span class="badge" style="border-color:var(--text-dim);color:var(--text-dim)">CONF: ${(f.confidence||'?').toUpperCase()}</span>
        </div>
      </div>

      <div class="forecast-summary">${d.summary || f.summary || 'No summary available.'}</div>

      <div class="timeframe-grid">
        <div class="timeframe-block">
          <div class="timeframe-label">▸ SHORT TERM (1–2 WKS)</div>
          <div class="timeframe-text">${d.short_term || f.short_term || '—'}</div>
        </div>
        <div class="timeframe-block">
          <div class="timeframe-label">▸ MEDIUM TERM (1–3 MO)</div>
          <div class="timeframe-text">${d.medium_term || f.medium_term || '—'}</div>
        </div>
        <div class="timeframe-block">
          <div class="timeframe-label">▸ LONG TERM (3–12 MO)</div>
          <div class="timeframe-text">${d.long_term || f.long_term || '—'}</div>
        </div>
      </div>

      ${assetViewsHTML}
      ${sectorHTML}

      ${risks.length || opps.length || hotspots.length ? `
      <div class="tags-row">
        ${hotspots.map(h => `<span class="tag" style="border-color:var(--warn);color:var(--warn)">⚠ ${h}</span>`).join('')}
        ${risks.map(r => `<span class="tag tag-risk">✕ ${r}</span>`).join('')}
        ${opps.map(o => `<span class="tag tag-opp">+ ${o}</span>`).join('')}
      </div>` : ''}

      <div class="forecast-time">// Generated ${timeAgo(f.created_at)} — ${f.created_at}</div>
    </div>`;
  }).join('');
}

// ── Market ───────────────────────────────────────────────────────────────────
async function loadMarket() {
  marketLoaded = true;
  const container = document.getElementById('market-container');
  const r = await fetch('/api/market');
  const data = await r.json();

  if (!data.length) {
    container.innerHTML = `<div class="empty">// NO MARKET DATA. RUN THE SCHEDULER TO FETCH PRICES.</div>`;
    return;
  }

  // Group by category
  const byCategory = {};
  data.forEach(d => {
    if (!byCategory[d.category]) byCategory[d.category] = [];
    byCategory[d.category].push(d);
  });

  let html = `<table class="market-table">
    <thead><tr>
      <th>Symbol</th><th>Name</th>
      <th style="text-align:right">Price</th>
      <th style="text-align:right">24h Change</th>
      <th style="text-align:right">Volume</th>
    </tr></thead><tbody>`;

  for (const [cat, rows] of Object.entries(byCategory)) {
    html += `<tr class="cat-header"><td colspan="5">${cat}</td></tr>`;
    rows.forEach(d => {
      const up = d.change_pct >= 0;
      const arrow = up ? '▲' : '▼';
      const cls = up ? 'up' : 'down';
      const vol = d.volume > 1e9 ? (d.volume/1e9).toFixed(2)+'B' :
                  d.volume > 1e6 ? (d.volume/1e6).toFixed(1)+'M' :
                  d.volume > 0 ? d.volume.toLocaleString() : '—';
      html += `<tr>
        <td><span style="font-family:var(--mono);color:var(--accent)">${d.symbol}</span></td>
        <td>${d.name}</td>
        <td class="price" style="text-align:right">${d.price.toLocaleString(undefined,{maximumFractionDigits:4})}</td>
        <td class="${cls}" style="text-align:right">${arrow} ${Math.abs(d.change_pct).toFixed(2)}%</td>
        <td style="text-align:right;color:var(--text-dim)">${vol}</td>
      </tr>`;
    });
  }

  html += '</tbody></table>';
  container.innerHTML = `<div class="card">${html}</div>`;
}

// ── News ─────────────────────────────────────────────────────────────────────
async function loadNews() {
  newsLoaded = true;
  const container = document.getElementById('news-container');
  const r = await fetch('/api/news');
  const articles = await r.json();

  if (!articles.length) {
    container.innerHTML = `<div class="empty">// NO NEWS DATA. RUN THE SCHEDULER FIRST.</div>`;
    return;
  }

  const regionColors = {
    us_europe: '#00d4ff',
    south_asia: '#ffb347',
    middle_east: '#ff6b35',
    global_markets: '#00ff9d',
    crypto: '#a78bfa',
  };

  container.innerHTML = `<div class="card">
    ${articles.map(a => `
    <div class="news-item">
      <div class="news-title">
        ${a.url ? `<a href="${a.url}" target="_blank" rel="noopener">${a.title || 'Untitled'}</a>` : (a.title || 'Untitled')}
        ${a.region ? `<span class="news-region" style="border-color:${regionColors[a.region]||'#4a7a9b'};color:${regionColors[a.region]||'#4a7a9b'}">${a.region.replace('_',' ')}</span>` : ''}
      </div>
      ${a.description ? `<div class="news-desc">${a.description.slice(0,160)}...</div>` : ''}
      <div class="news-meta">${a.source || 'Unknown source'} &nbsp;·&nbsp; ${a.fetched_at ? timeAgo(a.fetched_at) : ''}</div>
    </div>`).join('')}
  </div>`;
}

// ── Run Now ───────────────────────────────────────────────────────────────────
async function runNow() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ RUNNING...';
  try {
    const r = await fetch('/api/run-now', { method: 'POST' });
    const d = await r.json();
    if (d.status === 'success') {
      btn.textContent = '✅ DONE';
      await loadStatus();
      await loadForecasts();
      marketLoaded = false;
      newsLoaded = false;
    } else {
      btn.textContent = '❌ ERROR';
      alert('Error: ' + d.message);
    }
  } catch(e) {
    btn.textContent = '❌ ERROR';
    alert('Request failed: ' + e.message);
  }
  setTimeout(() => { btn.textContent = '▶ RUN NOW'; btn.disabled = false; }, 3000);
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadStatus();
loadForecasts();
</script>
